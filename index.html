<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --teal: #1A7A6E; --teal-l: #d1ece9;
    --red: #B03A2E;  --red-l: #fadbd8;
    --purple: #6C3483; --purple-l: #ead9f5;
    --green: #1E6B3C; --green-l: #d5f0e3;
    --navy: #1B2A4A; --grey: #f2f4f7; --border: #dde3ea;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--grey); color: #1a1a2e; min-height: 100vh; }

  /* Header */
  .app-header { background: var(--navy); color: white; padding: 18px 20px 14px;
                position: sticky; top: 0; z-index: 100;
                box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
  .app-header h1 { font-size: 19px; font-weight: 700; letter-spacing: .3px; }
  .app-header p  { font-size: 12px; opacity: .7; margin-top: 2px; }

  /* Day tabs */
  .tab-bar { display: flex; background: white; border-bottom: 2px solid var(--border);
             overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab { flex: 1; min-width: 72px; padding: 12px 6px 10px; text-align: center;
         font-size: 12px; font-weight: 600; color: #888; cursor: pointer;
         border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; }
  .tab.active { color: var(--navy); border-bottom-color: var(--navy); }
  .tab .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* Day view */
  .day-view { display: none; padding: 16px 14px 100px; }
  .day-view.active { display: block; }

  .day-banner { border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; color: white; }
  .day-banner h2 { font-size: 18px; font-weight: 700; }
  .day-banner p  { font-size: 13px; opacity: .85; margin-top: 4px; }

  /* Exercise card */
  .exercise-card { background: white; border-radius: 14px; margin-bottom: 12px;
                   box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; }
  .exercise-header { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: flex-start; }
  .exercise-name { font-size: 15px; font-weight: 700; color: var(--navy); flex: 1; }
  .exercise-meta { font-size: 11px; color: #888; margin-top: 3px; }
  .exercise-tip  { font-size: 11px; color: #aaa; font-style: italic; margin-top: 2px; }

  /* Sets table */
  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase;
                   padding: 6px 16px; text-align: left; background: #fafafa;
                   border-top: 1px solid var(--border); }
  .sets-table th:last-child { text-align: center; }
  .set-row { border-top: 1px solid var(--border); }
  .set-row td { padding: 10px 16px; vertical-align: middle; }
  .set-num { font-size: 13px; font-weight: 700; color: #bbb; width: 32px; }
  .target { font-size: 12px; color: #888; width: 90px; }

  /* Inputs */
  .input-group { display: flex; gap: 8px; align-items: center; }
  .log-input { width: 58px; padding: 8px 10px; border: 1.5px solid var(--border);
               border-radius: 9px; font-size: 15px; text-align: center;
               font-family: inherit; color: var(--navy); font-weight: 600;
               background: var(--grey); -webkit-appearance: none; }
  .log-input:focus { outline: none; border-color: var(--teal); background: white; }
  .input-label { font-size: 11px; color: #aaa; }
  .done-btn { width: 34px; height: 34px; border-radius: 50%; border: none;
              background: var(--border); color: #aaa; font-size: 18px; cursor: pointer;
              display: flex; align-items: center; justify-content: center;
              transition: all .2s; flex-shrink: 0; }
  .done-btn.checked { background: var(--teal); color: white; }

  /* Progress bar */
  .progress-wrap { padding: 10px 16px 14px; }
  .progress-label { font-size: 11px; color: #aaa; margin-bottom: 5px;
                    display: flex; justify-content: space-between; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

  /* Summary card */
  .summary-card { background: white; border-radius: 14px; padding: 18px;
                  margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
  .summary-card h3 { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center;
                 padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .summary-row:last-child { border: none; }
  .summary-val { font-weight: 700; color: var(--teal); }

  /* Reset button */
  .reset-btn { width: 100%; padding: 14px; border: 1.5px solid var(--border);
               background: white; border-radius: 12px; font-size: 14px;
               color: #888; cursor: pointer; margin-top: 8px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
           background: var(--navy); color: white; padding: 12px 22px; border-radius: 99px;
           font-size: 13px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 999;
           white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

// ── State ──────────────────────────────────────────────────────────
let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem('gymlog_v1');
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
}
function saveState() {
  try { localStorage.setItem('gymlog_v1', JSON.stringify(state)); } catch(e) {}
}
function getKey(dayId, exIdx, setIdx, field) {
  return `${dayId}_${exIdx}_${setIdx}_${field}`;
}
function getDoneKey(dayId, exIdx, setIdx) {
  return `${dayId}_${exIdx}_${setIdx}_done`;
}

// ── Build UI ───────────────────────────────────────────────────────
const tabBar = document.getElementById('tabBar');
const viewsEl = document.getElementById('views');

SCHEMA.forEach((day, di) => {
  // Tab
  const tab = document.createElement('div');
  tab.className = 'tab' + (di === 0 ? ' active' : '');
  tab.innerHTML = `<span class="tab-icon">${day.icon}</span>${day.label}<br><small style="font-weight:400;font-size:10px">${day.date}</small>`;
  tab.onclick = () => switchTab(di);
  tabBar.appendChild(tab);

  // View
  const view = document.createElement('div');
  view.className = 'day-view' + (di === 0 ? ' active' : '');
  view.id = 'view_' + day.id;

  let html = `
    <div class="day-banner" style="background:${day.color}">
      <h2>${day.icon} ${day.name}</h2>
      <p>${day.focus}</p>
    </div>`;

  day.exercises.forEach((ex, ei) => {
    const totalSets = ex.sets;
    html += `<div class="exercise-card" id="card_${day.id}_${ei}">
      <div class="exercise-header">
        <div>
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-meta">${ex.meta}</div>
          <div class="exercise-tip">💡 ${ex.tip}</div>
        </div>
      </div>
      <table class="sets-table">
        <tr>
          <th style="width:32px">#</th>
          <th>Doel</th>
          <th>Gewicht (kg)</th>
          <th>Reps</th>
          <th style="text-align:center">✓</th>
        </tr>`;

    for (let si = 0; si < totalSets; si++) {
      const wKey = getKey(day.id, ei, si, 'w');
      const rKey = getKey(day.id, ei, si, 'r');
      const dKey = getDoneKey(day.id, ei, si);
      const wVal = state[wKey] || '';
      const rVal = state[rKey] || '';
      const done = state[dKey] || false;
      html += `
        <tr class="set-row" id="setrow_${day.id}_${ei}_${si}">
          <td class="set-num">${si+1}</td>
          <td class="target">${ex.reps}</td>
          <td>
            <div class="input-group">
              <input class="log-input" type="number" inputmode="decimal" placeholder="—"
                value="${wVal}"
                onchange="logVal('${day.id}',${ei},${si},'w',this.value)"
                onfocus="this.select()">
              <span class="input-label">kg</span>
            </div>
          </td>
          <td>
            <div class="input-group">
              <input class="log-input" type="number" inputmode="numeric" placeholder="—"
                value="${rVal}"
                onchange="logVal('${day.id}',${ei},${si},'r',this.value)"
                onfocus="this.select()">
              <span class="input-label">reps</span>
            </div>
          </td>
          <td style="text-align:center">
            <button class="done-btn ${done?'checked':''}"
              onclick="toggleDone('${day.id}',${ei},${si})"
              id="donebtn_${day.id}_${ei}_${si}">✓</button>
          </td>
        </tr>`;
    }

    html += `</table>
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="prog_label_${day.id}_${ei}">Sets voltooid</span>
          <span id="prog_count_${day.id}_${ei}">0 / ${totalSets}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="prog_${day.id}_${ei}"
               style="background:${day.color};width:0%"></div>
        </div>
      </div>
    </div>`;
  });

  // Summary
  html += `<div class="summary-card">
    <h3>📊 Dagoverzicht</h3>
    <div id="summary_${day.id}"></div>
  </div>
  <button class="reset-btn" onclick="resetDay('${day.id}')">🔄 Dag resetten</button>`;

  view.innerHTML = html;
  viewsEl.appendChild(view);

  // Init progress bars
  day.exercises.forEach((ex, ei) => updateProgress(day.id, ei, ex.sets));
  updateSummary(day.id, di);
});

// ── Logic ──────────────────────────────────────────────────────────
function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.day-view').forEach((v,i) => v.classList.toggle('active', i===idx));
}

function logVal(dayId, ei, si, field, val) {
  state[getKey(dayId, ei, si, field)] = val;
  saveState();
  updateSummary(dayId, SCHEMA.findIndex(d=>d.id===dayId));
}

function toggleDone(dayId, ei, si) {
  const key = getDoneKey(dayId, ei, si);
  state[key] = !state[key];
  saveState();
  const btn = document.getElementById(`donebtn_${dayId}_${ei}_${si}`);
  btn.classList.toggle('checked', state[key]);
  const dayIdx = SCHEMA.findIndex(d=>d.id===dayId);
  updateProgress(dayId, ei, SCHEMA[dayIdx].exercises[ei].sets);
  updateSummary(dayId, dayIdx);
  if (state[key]) showToast('Set gelogd ✓');
}

function updateProgress(dayId, ei, totalSets) {
  let done = 0;
  for (let si=0; si<totalSets; si++) {
    if (state[getDoneKey(dayId, ei, si)]) done++;
  }
  const pct = Math.round((done/totalSets)*100);
  const fill = document.getElementById(`prog_${dayId}_${ei}`);
  const count = document.getElementById(`prog_count_${dayId}_${ei}`);
  if (fill) fill.style.width = pct + '%';
  if (count) count.textContent = `${done} / ${totalSets}`;
}

function updateSummary(dayId, dayIdx) {
  const day = SCHEMA[dayIdx];
  const el = document.getElementById(`summary_${dayId}`);
  if (!el) return;
  let totalSets = 0, doneSets = 0, totalVol = 0;
  day.exercises.forEach((ex, ei) => {
    for (let si=0; si<ex.sets; si++) {
      totalSets++;
      const done = state[getDoneKey(dayId, ei, si)];
      if (done) {
        doneSets++;
        const w = parseFloat(state[getKey(dayId,ei,si,'w')])||0;
        const r = parseInt(state[getKey(dayId,ei,si,'r')])||0;
        totalVol += w*r;
      }
    }
  });
  el.innerHTML = `
    <div class="summary-row"><span>Sets voltooid</span><span class="summary-val">${doneSets} / ${totalSets}</span></div>
    <div class="summary-row"><span>Totaal volume</span><span class="summary-val">${totalVol > 0 ? totalVol.toLocaleString('nl') + ' kg' : '—'}</span></div>
    <div class="summary-row"><span>Voortgang</span><span class="summary-val">${Math.round((doneSets/totalSets)*100)}%</span></div>`;
}

function resetDay(dayId) {
  if (!confirm('Wil je alle data voor deze dag wissen?')) return;
  const dayIdx = SCHEMA.findIndex(d=>d.id===dayId);
  const day = SCHEMA[dayIdx];
  day.exercises.forEach((ex,ei) => {
    for (let si=0; si<ex.sets; si++) {
      delete state[getKey(dayId,ei,si,'w')];
      delete state[getKey(dayId,ei,si,'r')];
      delete state[getDoneKey(dayId,ei,si)];
      const btn = document.getElementById(`donebtn_${dayId}_${ei}_${si}`);
      if (btn) btn.classList.remove('checked');
      const wIn = document.querySelector(`#setrow_${dayId}_${ei}_${si} input[inputmode="decimal"]`);
      const rIn = document.querySelector(`#setrow_${dayId}_${ei}_${si} input[inputmode="numeric"]`);
      if (wIn) wIn.value = '';
      if (rIn) rIn.value = '';
      updateProgress(dayId, ei, ex.sets);
    }
  });
  saveState();
  updateSummary(dayId, dayIdx);
  showToast('Dag gereset 🔄');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
